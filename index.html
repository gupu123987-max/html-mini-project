<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNews  - ระบบข่าวสารอัตโนมัติ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-12">

<nav class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 h-16 flex justify-between items-center">
        <h1 class="text-xl font-bold text-slate-800">SmartNews </h1>
        <div class="flex items-center gap-4">
            <button onclick="fetchNews()" id="refreshBtn" class="text-slate-400 hover:text-indigo-600 p-2">
                <i class="fas fa-sync-alt text-lg"></i>
            </button>
            <div id="adminStatus" class="hidden">
                <button onclick="logout()" class="text-red-500 p-2">Logout</button>
            </div>
            <button id="loginBtn" onclick="toggleModal('loginModal', true)" class="text-slate-600">
                แอดมิน
            </button>
        </div>
    </div>
</nav>

<header class="bg-indigo-900 text-white py-16 text-center">
    <h2 class="text-4xl font-bold mb-4">ข่าวสารรอบโลก </h2>
    <button id="addNewsBtn" onclick="toggleForm()" class="hidden mt-6 bg-white text-indigo-900 px-6 py-3 rounded-full font-bold">
        <span>เขียนข่าวใหม่</span>
    </button>
</header>

<main class="max-w-4xl mx-auto px-4 mt-8">

<div id="newsFormContainer" class="hidden bg-white p-6 rounded-xl shadow mb-10">
    <form id="newsForm" onsubmit="addNews(event)" class="space-y-4">
        <input type="text" id="newsTitle" placeholder="หัวข้อข่าว" class="w-full p-3 border rounded" required>
        <textarea id="newsContent" placeholder="เนื้อหาข่าว..." rows="4" class="w-full p-3 border rounded" required></textarea>
        <input type="file" id="newsImage" accept="image/*" class="w-full p-3 border rounded">
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded">เผยแพร่ข่าว</button>
    </form>
</div>

<div id="newsList" class="grid gap-6">
    <div class="text-center py-20" id="loadingState">
        <p class="text-slate-400">กำลังโหลดข่าว...</p>
    </div>
</div>

</main>

<div id="loginModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
    <div class="bg-white p-6 rounded-xl w-80">
        <h3 class="text-xl font-bold mb-4">แอดมินล็อกอิน</h3>
        <form onsubmit="login(event)" class="space-y-4">
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน (123)" class="w-full p-3 border rounded">
            <p id="loginError" class="text-red-500 text-sm hidden">รหัสผ่านไม่ถูกต้อง</p>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded">ยืนยัน</button>
        </form>
    </div>
</div>

<script>
const geminiApiKey = "";
const ADMIN_PASSWORD = "123";
let isAdmin = false;
let newsData = [];

// โหลดตอนเปิดเว็บ
window.onload = function() {
    const savedNews = localStorage.getItem("myNews");

    if (savedNews) {
        newsData = JSON.parse(savedNews);
        renderNews();
    } else {
        fetchNews();
    }
};

// ดึงข่าว AI
async function fetchNews() {
    const loading = document.getElementById('loadingState');
    loading.style.display = 'block';

    try {
        newsData = [{
            id: Date.now(),
            title: "ข่าวตัวอย่างจาก ",
            content: "นี่คือข่าวตัวอย่าง (ใส่ API key เพื่อใช้งานจริง)",
            date: new Date().toLocaleDateString('th-TH')
        }];
        renderNews();
    } catch {
        newsData = [];
        renderNews();
    } finally {
        loading.style.display = 'none';
    }
}

// แสดงข่าว
function renderNews() {
    const list = document.getElementById('newsList');
    list.innerHTML = '';

    if (newsData.length === 0) {
        list.innerHTML = '<div class="text-center py-10 text-gray-400">ไม่มีข่าว</div>';
        return;
    }

    newsData.forEach(news => {
        const article = document.createElement('div');
        article.className = "bg-white p-6 rounded-xl shadow relative";

        article.innerHTML = `
            <div class="text-sm text-indigo-500 mb-2">${news.date}</div>
            ${news.image ? `<img src="${news.image}" class="w-full h-60 object-cover rounded mb-4">` : ''}
            <h3 class="text-xl font-bold mb-2">${news.title}</h3>
            <p class="text-gray-600 mb-4">${news.content}</p>
        `;

        if (isAdmin) {
            const del = document.createElement("button");
            del.innerText = "ลบ";
            del.className = "absolute top-4 right-4 text-red-500";
            del.onclick = () => deleteNews(news.id);
            article.appendChild(del);
        }

        list.appendChild(article);
    });
}

// เพิ่มข่าว
function addNews(e) {
    e.preventDefault();

    const title = document.getElementById("newsTitle").value;
    const content = document.getElementById("newsContent").value;
    const imageInput = document.getElementById("newsImage");

    const reader = new FileReader();

    reader.onload = function(event) {
        const newArticle = {
            id: Date.now(),
            title,
            content,
            date: new Date().toLocaleDateString('th-TH'),
            image: event.target.result
        };

        newsData.unshift(newArticle);
        localStorage.setItem("myNews", JSON.stringify(newsData));

        renderNews();
        toggleForm(false);
        document.getElementById("newsForm").reset();
    };

    if (imageInput.files.length > 0) {
        reader.readAsDataURL(imageInput.files[0]);
    } else {
        reader.onload({ target: { result: null } });
    }
}

// ลบข่าว
function deleteNews(id) {
    if (confirm("ต้องการลบข่าวนี้?")) {
        newsData = newsData.filter(n => n.id !== id);
        localStorage.setItem("myNews", JSON.stringify(newsData));
        renderNews();
    }
}

// ระบบแอดมิน
function login(e) {
    e.preventDefault();
    const pass = document.getElementById("adminPassword").value;
    if (pass === ADMIN_PASSWORD) {
        isAdmin = true;
        updateUI();
        toggleModal('loginModal', false);
    } else {
        document.getElementById("loginError").classList.remove("hidden");
    }
}

function logout() {
    isAdmin = false;
    updateUI();
}

function updateUI() {
    document.getElementById('adminStatus').style.display = isAdmin ? 'block' : 'none';
    document.getElementById('loginBtn').style.display = isAdmin ? 'none' : 'inline';
    document.getElementById('addNewsBtn').classList.toggle('hidden', !isAdmin);
    renderNews();
}

function toggleModal(id, show) {
    const modal = document.getElementById(id);
    modal.style.display = show ? 'flex' : 'none';
}

function toggleForm(force) {
    const container = document.getElementById('newsFormContainer');
    container.classList.toggle('hidden');
}
</script>

</body>
</html>
